apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: default
  labels:
    app: flask
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: web
        # UPDATE THIS LINE: <YOUR-ECR-URL>:<YOUR-COMMIT-SHA>
        # Example: 123456789012.dkr.ecr.us-east-1.amazonaws.com/platform-app-repo:a1b2c3d
        image: YOUR_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/platform-app-repo:YOUR_COMMIT_SHA
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: flask
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080